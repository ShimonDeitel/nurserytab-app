name: Nurserytab
options:
  bundleIdPrefix: com.shimondeitel.nurserytab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Nurserytab:
    type: application
    platform: iOS
    sources:
      - path: Nurserytab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nurserytab
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Nurserytab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NurserytabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NurserytabTests
      - path: Nurserytab.storekit
    dependencies:
      - target: Nurserytab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nurserytab.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NurserytabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NurserytabUITests
    dependencies:
      - target: Nurserytab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nurserytab.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Nurserytab:
    build:
      targets:
        Nurserytab: all
        NurserytabTests: [test]
        NurserytabUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Nurserytab.storekit
    test:
      config: Debug
      storeKitConfiguration: Nurserytab.storekit
      targets:
        - NurserytabTests
        - NurserytabUITests
    archive:
      config: Release
