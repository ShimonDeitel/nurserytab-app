<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nurserytab</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#140F1C; color:#EEE7F9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .wrap { max-width:560px; text-align:center; padding:40px 24px; }
  h1 { font-size:2.2rem; margin-bottom:8px; color:#7C3AED; }
  p.tag { color:#BCA4F0; font-size:1.1rem; margin-bottom:32px; }
  .cta { display:inline-block; background:#7C3AED; color:#fff; padding:14px 28px; border-radius:12px; text-decoration:none; font-weight:600; }
  footer { margin-top:40px; font-size:0.85rem; color:#BCA4F0; }
  a { color:#7C3AED; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #7C3AED55 0%, #7C3AED00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Nurserytab</h1>
    <p class="tag">Keep receipts and warranty info for every plant you've bought from nurseries.</p>
    <a class="cta" href="#">Coming to the App Store</a>
    <footer>
      <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
      <p>Contact: s0533495227@gmail.com</p>
    </footer>
  </div>
</body>
</html>
